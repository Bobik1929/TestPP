<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест по первой помощи (100 вопросов)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f7;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        .test-container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px 20px;
        }
        h1 {
            font-size: 2rem;
            color: #0b3b4e;
            margin: 0 0 10px 0;
            border-bottom: 3px solid #2a9d8f;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 span {
            background: #2a9d8f;
            color: white;
            padding: 5px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            background: #e0f2f1;
            padding: 12px;
            border-radius: 50px;
            margin: 20px 0;
            font-weight: 600;
        }
        .question-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #dde7f0;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1d4e6b;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option {
            padding: 12px 18px;
            background: white;
            border-radius: 40px;
            border: 2px solid #d4e0e9;
            cursor: pointer;
            transition: 0.1s;
            font-size: 1rem;
        }
        .option:hover {
            background: #e5f0fb;
            border-color: #7bb3d9;
        }
        .option.correct-answer {
            background: #c8e6c9;
            border-color: #2e7d32;
            font-weight: 500;
        }
        .option.wrong-selected {
            background: #ffcdd2;
            border-color: #b71c1c;
            text-decoration: line-through;
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.9;
        }
        .marker {
            float: right;
            font-size: 1.3rem;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        button {
            padding: 14px 25px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            background: #edf4fb;
            border: 1px solid #bcd3e6;
            flex: 1 1 auto;
        }
        button.primary {
            background: #1d6f8c;
            color: white;
            border: none;
        }
        button.primary:hover {
            background: #135b75;
        }
        button.secondary:hover {
            background: #d0e2f5;
        }
        .result-box {
            margin-top: 30px;
            background: #e1f0fa;
            border-radius: 30px;
            padding: 20px;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 700;
            border: 2px dashed #2a9d8f;
        }
        .shuffle-info {
            text-align: right;
            color: #5f7d9c;
            font-style: italic;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .legend {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 10px;
        }
        .legend-green {
            background: #c8e6c9;
            border: 2px solid #2e7d32;
        }
        .legend-red {
            background: #ffcdd2;
            border: 2px solid #b71c1c;
        }
        footer {
            margin-top: 15px;
            color: #5d7f96;
        }
    </style>
</head>
<body>
<div class="test-container" id="app">
    <h1>
        🚑 Первая помощь
        <span>100 вопросов</span>
    </h1>
    
    <div class="shuffle-info">
        🔀 Вопросы перемешаны · загрузи страницу заново для нового порядка
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color legend-green"></div>
            <span>✓ правильный ответ</span>
        </div>
        <div class="legend-item">
            <div class="legend-color legend-red"></div>
            <span>✗ ваш неправильный ответ</span>
        </div>
    </div>

    <div class="stats" id="stats">
        <span>✅ Верно: <span id="correct">0</span></span>
        <span>❌ Неверно: <span id="wrong">0</span></span>
        <span>📌 Отвечено: <span id="answered">0</span>/100</span>
    </div>

    <div id="questions"></div>

    <div class="buttons">
        <button id="resetBtn" class="secondary">🔄 Сбросить всё</button>
        <button id="reshuffleBtn" class="secondary">🎲 Перемешать вопросы</button>
        <button id="resultBtn" class="primary">📊 Итоговый результат</button>
    </div>

    <div id="finalResult" class="result-box" style="display: none;"></div>
    <footer>👆 Кликни по ответу — увидишь правильный вариант</footer>
</div>

<script>
    (function() {
        //------------ ВСЕ 100 ВОПРОСОВ (правильные ответы из твоего файла) ------------
        const originalQuestions = [
            // Вопросы 1-10
            {
                text: "1. Во время наложения повязки на раненый мизинец пострадавший внезапно побледнел, перестал реагировать на окружающее. Укажите, с чего вы начнете оказывать первую помощь:",
                options: [

            },
            {

                    "б) наложить кровоостанавливающий жгут, рану закрыть стерильной повязкой и придавить сверху рукой",
                    "в) наложить давящую повязку на рану, как можно скорее доставить пострадавшего в медицинскую организацию",
                    "г) зажать артерию в ране, наложить кровоостанавливающий жгут, наложить давящую повязку"
                ],
                correct: "а) осуществить прямое давление на рану, наложить давящую повязку на рану, при неэффективности наложить кровоостанавливающий жгут"
            },
            {

        // Функция перемешивания массива (алгоритм Фишера-Йетса)
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

                            marker = ' ✗';
                        }
                        // Если ответ правильный - добавляем галочку к выбранному
                        if (answer.selected === opt && answer.isCorrect) {
                            marker = ' ✓';
                        }
                    }
                    
                    html += `<div class="option ${disabledClass} ${additionalClasses}" data-opt="${opt}">`;
                    html += `${opt} <span class="marker">${marker}</span>`;
                    html += `</div>`;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;

            let correctCount = answers.filter(a => a && a.isCorrect).length;
            let wrongCount = answers.filter(a => a && !a.isCorrect).length;
            let answeredCount = answers.filter(a => a !== null).length;
            correctSpan.innerText = correctCount;
            wrongSpan.innerText = wrongCount;
            answeredSpan.innerText = answeredCount;
        }

        container.addEventListener('click', function(e) {
            let optionDiv = e.target.closest('.option');
            if (!optionDiv) return;
            let optionsDiv = optionDiv.parentNode;
            if (!optionsDiv.classList.contains('options')) return;
            let qIdx = optionsDiv.dataset.qidx;
            if (qIdx === undefined) return;
            if (answers[qIdx] !== null) return;

            let selectedText = optionDiv.dataset.opt;
            let correctText = currentQuestions[qIdx].correct;
            let isCorrect = (selectedText === correctText);

            answers[qIdx] = { selected: selectedText, isCorrect: isCorrect };
            render();
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            answers = new Array(currentQuestions.length).fill(null);
            document.getElementById('finalResult').style.display = 'none';
            render();
        });

        document.getElementById('reshuffleBtn').addEventListener('click', function() {
            currentQuestions = shuffleArray(originalQuestions);
            answers = new Array(currentQuestions.length).fill(null);
            document.getElementById('finalResult').style.display = 'none';
            render();
        });

        document.getElementById('resultBtn').addEventListener('click', function() {
            let correctCount = answers.filter(a => a && a.isCorrect).length;
            let total = currentQuestions.length;
            let percent = Math.round((correctCount / total) * 100);
            let resultDiv = document.getElementById('finalResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `🎯 Результат: ${correctCount} из ${total} правильных (${percent}%)`;
        });

        render();
    })();
</script>
</body>
</html>
